services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cqrs-ledger-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://db:5432/ledgerdb
      - DB_USERNAME=ledger
      - DB_PASSWORD=ledger123
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ledger-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: cqrs-ledger-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ledgerdb
      - POSTGRES_USER=ledger
      - POSTGRES_PASSWORD=ledger123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ledger-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledgerdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  ledger-network:
    driver: bridge

volumes:
  postgres-data:
