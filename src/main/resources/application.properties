# Server Configuration
server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Response Compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain
server.compression.min-response-size=1024

# Application Name
spring.application.name=cqrs-event-sourcing-ledger

# Default Profile (can be overridden)
spring.profiles.active=dev

# JPA Configuration
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Actuator Configuration
management.endpoint.health.show-details=when_authorized
management.endpoints.web.exposure.include=health,info,metrics

# Tracing Configuration
management.tracing.sampling.probability=1.0

# H2 Console (disabled by default for security)
spring.h2.console.enabled=false
