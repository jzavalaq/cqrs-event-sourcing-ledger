# Production Profile - PostgreSQL Database

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ledgerdb}
    username: ${DB_USERNAME:ledger}
    password: ${DB_PASSWORD:ledger123}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      max-lifetime: 1800000
      minimum-idle: 2
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

# JWT Configuration (must be set via environment)
jwt:
  secret: ${JWT_SECRET:change-me-in-production}
  expiration: 86400000

# CORS for production
cors:
  allowed-origins: ${ALLOWED_ORIGINS:https://ledger.example.com}

# Logging
logging:
  level:
    com.ledger: INFO
    org.springframework.security: WARN
