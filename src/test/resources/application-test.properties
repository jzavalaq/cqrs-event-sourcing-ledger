# Test Configuration

# JWT test configuration
jwt.secret=test-secret-key-for-testing-only-32chars-min

# CORS test configuration
cors.allowed-origins=http://localhost:3000,http://localhost:8080

# H2 test database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA test configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway disabled for tests (using Hibernate auto-ddl)
spring.flyway.enabled=false

# H2 console disabled in tests
spring.h2.console.enabled=false

# Logging
logging.level.com.ledger=DEBUG
logging.level.org.springframework.security=WARN
